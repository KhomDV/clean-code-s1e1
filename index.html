<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link rel="stylesheet" 
        href="https://fonts.googleapis.com/css?family=Lato:300,400,700">
  <link rel="stylesheet" 
        href="style.css" 
        media="screen" 
        charset="utf-8">
</head>
<body class="body">
  <div class="header">
    <img class="img-header" src="./eisenhower-matrix.jpg" alt="The Eisenhower matrix">
    <a class="more-inf" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
  </div>
  <div class="main-container">
    <p id="add-task">
      <label for="new-task" class="label">Add Item</label>
      <div class="task-row-wrapper">
        <input id="new-task" class="task input text-input" type="text">
        <button class="btn add">Add</button>
      </div>
    </p>
    <h3 class="task-title">Todo</h3>
    <ul id="incomplete-tasks" class="list">
      <li class="task-item">
        <input class="input input-checkbox" type="checkbox">
        <label class="label task task-label">Pay Bills</label>
        <input type="text" class="task input text-input">
        <button class="btn edit">Edit</button>
        <button class="btn delete">
          <img class="img-delete" src="./remove.svg" alt="delete">
        </button>
      </li>
      <li class="edit-mode task-item">
        <input class="input input-checkbox" type="checkbox">
        <label class="label task task-label">Go Shopping</label>
        <input type="text" value="Go Shopping" class="task input text-input">
        <button class="btn edit">Save</button>
        <button class="btn delete">
          <img class="img-delete" src="./remove.svg" alt="delete">
        </button>
      </li>
    </ul>
    <h3 class="task-title">Completed</h3>
    <ul id="completed-tasks" class="list">
      <li class="task-item">
        <input class="input input-checkbox" type="checkbox" checked>
        <label class="label task task-label">See the Doctor</label>
        <input type="text" class="task input text-input">
        <button class="btn edit">Edit</button>
        <button class="btn delete">
          <img class="img-delete" src="./remove.svg" alt="delete">
        </button>
      </li>
    </ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
